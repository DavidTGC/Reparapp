name: reparapp
description: "Aplicación móvil para gestión de tareas de operarios - Reparapp"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI y Navegación
  cupertino_icons: ^1.0.2
  intl: ^0.19.0
  table_calendar: ^3.0.9
  image_picker: ^1.0.4
  camera: ^0.10.5
  path_provider: ^2.1.1
  
  # Gestión de estado
  provider: ^6.0.0
  
  # Almacenamiento local
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - assets/images/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
